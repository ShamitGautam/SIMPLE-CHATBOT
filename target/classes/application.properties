Generative AI Project 1 — Custom AI Chatbot with Memory
This is an industrial training kit from DecodeLabs (Batch 2026) that teaches you how to build a stateful AI chatbot. Here's a breakdown of everything it covers:

The Core Problem: LLMs Have No Memory
By default, Large Language Models (LLMs) are stateless — every time you send a message, the model treats it as a brand new conversation with zero context from before. This is called the "Amnesiac Cloud" problem.

So if you say "My name is Vipin" in message 1, and ask "What's my name?" in message 3, a stateless model has no idea.

The Solution: Artificial Memory Loop
The project teaches you to simulate memory by maintaining a conversation history array in your code. The formula is:

Input (current message + history) → Process (LLM API) → Output (response)

Every turn, you:

Append the user's new message to the history list
Send the entire history to the LLM API
Append the AI's response back to the same list
This way the model always has full context of the conversation.

Key Concepts Explained
Stateless vs Stateful

Stateless	Stateful
Memory	None	Full history sent each turn
Overhead	Low	High (grows with conversation)
Risk	Minimal	Context window overflow
Chat Session Schema — Modern AI SDKs use structured message objects, not raw text. Each message has a role (user or model) and content parts (text, images, tool calls).

Structural Validation Gate — Before sending to the API, you must check that the input is not empty/whitespace, otherwise you get a 400 Bad Request error that crashes your app.

The Sliding Window Algorithm — Since sending an ever-growing history will eventually exceed the model's token limit, you implement FIFO (First-In-First-Out) pruning — oldest messages get dropped, keeping only the most recent relevant context.

The Memory Test (System Audit)
The project validates your chatbot through 3 steps:

User says "My name is Vipin" → Model acknowledges
User asks for a poem about tech → Large response fills the context (stress test)
User asks "What is my name?" → Model should still correctly answer "Vipin" from history
Scaling Beyond Local RAM
The document also covers what happens when you move beyond a simple terminal app:

Local RAM is fine for prototyping, but if the server restarts, all session data is lost
Firestore (NoSQL) works but has a strict 1MB document size cap and per-read/write billing
PostgreSQL stores history reliably using a session_id (UUID) + message (JSONB) schema
Firebase SQL Connect is the enterprise-grade solution — managed Cloud SQL with GraphQL, horizontal scaling, and auto-generated SDKs
What Skills You Build
Skill	What It Means
Stateless vs Stateful APIs	Building memory loops on top of REST endpoints
Session State Management	Input validation, FIFO truncation, sliding windows
Generative SDK Architecture	Structured role-content payloads for multi-turn chat
Bottom Line
This project takes you from "just calling an API" to building a real, contextual, production-aware chatbot — the foundational skill needed before tackling RAG systems, autonomous agents, or any serious AI application.

