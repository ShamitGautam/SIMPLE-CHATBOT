<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova — AI Chat with Memory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14121c;
    --surface: #1c1930;
    --surface-2: #252140;
    --border: rgba(255,255,255,0.08);
    --text: #f2f0fb;
    --muted: #8b86a8;
    --primary: #b57bff;
    --accent: #6ad6ff;
    --gradient: linear-gradient(135deg, #b57bff 0%, #6ad6ff 100%);
    --glow: 0 0 40px -8px rgba(181,123,255,0.5);
    --shadow: 0 20px 60px -20px rgba(0,0,0,0.7);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(at 20% 0%, rgba(140,80,200,0.35) 0, transparent 50%),
      radial-gradient(at 80% 100%, rgba(60,140,200,0.28) 0, transparent 50%),
      radial-gradient(at 50% 50%, rgba(150,80,180,0.2) 0, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    max-width: 900px;
    height: 100dvh;
    margin: 0 auto;
    padding: 16px;
    gap: 16px;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: rgba(28,25,48,0.7);
    backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
  }
  .brand { display:flex; align-items:center; gap:12px; }
  .logo {
    width:40px; height:40px;
    border-radius:12px;
    background: var(--gradient);
    box-shadow: var(--glow);
    display:flex; align-items:center; justify-content:center;
    font-size:20px;
  }
  .brand h1 {
    font-family:'Space Grotesk', sans-serif;
    font-size:17px; font-weight:600; letter-spacing:-0.02em;
  }
  .brand p {
    font-family:'JetBrains Mono', monospace;
    font-size:10px; text-transform:uppercase; letter-spacing:0.18em;
    color:var(--muted); margin-top:2px;
  }
  .header-actions { display:flex; gap:8px; align-items:center; }
  .pill, .btn {
    display:flex; align-items:center; gap:6px;
    padding:7px 12px;
    border-radius:999px;
    border:1px solid var(--border);
    background: rgba(37,33,64,0.6);
    color: var(--muted);
    font-size:12px;
    font-family:inherit;
    cursor:default;
  }
  .pill b { color: var(--accent); font-family:'JetBrains Mono', monospace; font-weight:500; }
  .btn { cursor:pointer; transition: all .2s; }
  .btn:hover:not(:disabled) {
    border-color: rgba(255,80,80,0.4);
    background: rgba(255,80,80,0.1);
    color: var(--text);
  }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    background: rgba(28,25,48,0.3);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 18px;
    backdrop-filter: blur(8px);
  }
  .messages::-webkit-scrollbar { width:6px; }
  .messages::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius:3px; }
  .msg-list { display:flex; flex-direction:column; gap:20px; }

  .msg { display:flex; gap:12px; animation: fadeUp .35s ease-out both; }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    width:32px; height:32px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:600;
    flex-shrink:0;
  }
  .msg.ai .avatar { background: var(--gradient); box-shadow: var(--glow); }
  .msg.user .avatar { background: var(--surface-2); border:1px solid var(--border); }
  .bubble {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.ai .bubble {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .msg.user .bubble {
    background: var(--gradient);
    color: #17102a;
    font-weight: 500;
    border-top-right-radius: 4px;
    box-shadow: var(--glow);
  }

  /* Typing */
  .typing .bubble { display:flex; gap:5px; padding:16px; }
  .dot {
    width:6px; height:6px; border-radius:50%;
    background: var(--muted);
    animation: typing 1.2s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay:.15s; }
  .dot:nth-child(3) { animation-delay:.3s; }

  /* Empty state */
  .empty {
    display:flex; flex-direction:column; align-items:center;
    justify-content:center; height:100%; text-align:center;
    padding: 20px; animation: fadeUp .5s ease-out both;
  }
  .empty-logo {
    width:64px; height:64px; border-radius:18px;
    background: var(--gradient);
    display:flex; align-items:center; justify-content:center;
    font-size:32px; box-shadow: var(--glow);
    margin-bottom: 24px;
    position:relative;
  }
  .empty-logo::before {
    content:''; position:absolute; inset:-20px;
    background: var(--gradient); filter: blur(40px); opacity:.4; z-index:-1;
  }
  .empty h2 {
    font-family:'Space Grotesk', sans-serif;
    font-size: 32px; font-weight: 600; letter-spacing:-0.02em;
  }
  .empty h2 .grad {
    background: var(--gradient);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .empty p {
    color: var(--muted); font-size:14px; margin-top:10px;
    max-width: 400px; line-height:1.6;
  }
  .suggestions {
    display:grid; grid-template-columns: 1fr 1fr; gap:8px;
    margin-top:32px; width:100%; max-width:560px;
  }
  .suggestion {
    padding: 12px 16px; text-align:left;
    background: rgba(37,33,64,0.6);
    border:1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-size:13px; font-family:inherit;
    cursor:pointer; transition: all .2s;
  }
  .suggestion:hover {
    border-color: rgba(181,123,255,0.4);
    color: var(--text);
    background: var(--surface-2);
  }
  .suggestion .tag {
    font-family:'JetBrains Mono', monospace;
    font-size:9px; text-transform:uppercase; letter-spacing:.15em;
    color: var(--accent); opacity:.6; margin-right:8px;
  }

  /* COMPOSER */
  .composer-wrap { display:flex; flex-direction:column; gap:8px; }
  .composer {
    display:flex; gap:8px; align-items:flex-end;
    padding: 8px;
    background: rgba(28,25,48,0.7);
    backdrop-filter: blur(20px) saturate(1.4);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    transition: all .2s;
  }
  .composer:focus-within {
    border-color: rgba(181,123,255,0.5);
    box-shadow: var(--glow);
  }
  textarea {
    flex:1;
    background:transparent; border:none; outline:none;
    color: var(--text); font-family:inherit;
    font-size:14px; line-height:1.5;
    padding: 10px 12px;
    resize:none;
    min-height:44px; max-height:160px;
  }
  textarea::placeholder { color: rgba(139,134,168,0.7); }
  .send {
    width:40px; height:40px;
    border:none; border-radius:12px;
    background: var(--gradient);
    color:#17102a; font-size:18px; font-weight:700;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow: var(--glow);
    transition: transform .1s;
    flex-shrink:0;
  }
  .send:hover:not(:disabled) { transform: scale(1.05); }
  .send:active:not(:disabled) { transform: scale(0.95); }
  .send:disabled { opacity:0.4; cursor:not-allowed; }
  .footnote {
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:10px; text-transform:uppercase; letter-spacing:.18em;
    color: rgba(139,134,168,0.7);
  }

  /* Error bubble */
  .error-bubble {
    background: rgba(255,80,80,0.1) !important;
    border-color: rgba(255,80,80,0.3) !important;
    color: #ff8080 !important;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes typing {
    0%,60%,100% { transform: translateY(0); opacity:.4; }
    30% { transform: translateY(-6px); opacity:1; }
  }

  @media (max-width: 600px) {
    .app { padding: 10px; gap: 10px; }
    .pill { display:none; }
    .suggestions { grid-template-columns: 1fr; }
    .empty h2 { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="brand">
      <div class="logo">✦</div>
      <div>
        <h1>Nova</h1>
        <p>AI · with memory</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="pill">🧠 <b id="count">0</b> msgs</div>
      <button class="btn" id="clearBtn" disabled>🗑 <span>Clear</span></button>
    </div>
  </header>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="empty" id="empty">
      <div class="empty-logo">✦</div>
      <h2>Say hello to <span class="grad">Nova</span></h2>
      <p>Your AI companion that remembers the conversation. Tell it your name, share context — it'll keep up.</p>
      <div class="suggestions" id="suggestions">
        <button class="suggestion"><span class="tag">try</span>What can you help me with?</button>
        <button class="suggestion"><span class="tag">try</span>Remember my name is Alex</button>
        <button class="suggestion"><span class="tag">try</span>Explain quantum computing simply</button>
        <button class="suggestion"><span class="tag">try</span>Write a haiku about the ocean</button>
      </div>
    </div>
  </div>

  <!-- COMPOSER -->
  <div class="composer-wrap">
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Message Nova…  (Shift+Enter for newline)"></textarea>
      <button class="send" id="sendBtn" disabled aria-label="Send">↑</button>
    </div>
    <div class="footnote" id="footnote">Sliding window · 10 turns · Session memory</div>
  </div>

</div>

<script>
  // ── DOM refs ──
  const messagesEl = document.getElementById('messages');
  const emptyEl    = document.getElementById('empty');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const clearBtn   = document.getElementById('clearBtn');
  const countEl    = document.getElementById('count');
  const footnoteEl = document.getElementById('footnote');

  // ── State ──
  let sessionId  = null;   // unique ID from backend
  let isTyping   = false;
  let listEl     = null;   // msg-list div (created on first message)
  let msgCount   = 0;

  // ─────────────────────────────────────────
  //  INIT — get a session ID from the backend
  // ─────────────────────────────────────────
  async function initSession() {
    try {
      const res  = await fetch('/api/session/new');
      const data = await res.json();
      sessionId  = data.sessionId;
      footnoteEl.textContent =
        `Session: ${sessionId.substring(0,8)}… · Sliding window · 10 turns`;
      sendBtn.disabled = !inputEl.value.trim();
    } catch (e) {
      footnoteEl.textContent = '⚠ Could not connect to server — is it running?';
    }
  }

  // ─────────────────────────────────────────
  //  SEND
  // ─────────────────────────────────────────
  async function send(overrideText) {
    const text = (overrideText ?? inputEl.value).trim();
    if (!text || isTyping || !sessionId) return;

    // Remove empty state on first message
    if (emptyEl.parentElement) emptyEl.remove();

    // Show user bubble
    appendBubble('user', text);

    // Reset input
    inputEl.value = '';
    inputEl.style.height = 'auto';
    setLocked(true);

    // Show typing indicator
    const typingEl = showTyping();

    try {
      // ── Real backend call ──
      const res  = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: text })
      });

      const data = await res.json();
      hideTyping(typingEl);

      if (data.error) {
        appendBubble('ai', '❌ ' + data.error, true);
      } else {
        appendBubble('ai', data.response);
        // Update memory counter with real value from backend
        countEl.textContent = data.historySize;
        msgCount = data.historySize;
        clearBtn.disabled = false;
      }

    } catch (err) {
      hideTyping(typingEl);
      appendBubble('ai', '❌ Network error — is the server running?', true);
    }

    setLocked(false);
    inputEl.focus();
  }

  // ─────────────────────────────────────────
  //  CLEAR — wipes UI + server memory
  // ─────────────────────────────────────────
  async function clearChat() {
    if (!sessionId) return;

    // Tell backend to wipe this session's history
    await fetch('/api/clear', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId })
    });

    // Reset UI
    if (listEl) { listEl.remove(); listEl = null; }
    messagesEl.appendChild(emptyEl);
    emptyEl.querySelector('h2').innerHTML =
      'Fresh start, <span class="grad">Nova</span> is ready';
    countEl.textContent = '0';
    msgCount = 0;
    clearBtn.disabled = true;
  }

  // ─────────────────────────────────────────
  //  UI helpers
  // ─────────────────────────────────────────
  function ensureList() {
    if (!listEl) {
      listEl = document.createElement('div');
      listEl.className = 'msg-list';
      messagesEl.appendChild(listEl);
    }
  }

  function appendBubble(role, text, isError = false) {
    ensureList();
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isError ? ' error-bubble' : '');
    bubble.textContent = text;
    wrap.innerHTML = `<div class="avatar">${role === 'user' ? 'You' : '✦'}</div>`;
    wrap.appendChild(bubble);
    listEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    ensureList();
    const wrap = document.createElement('div');
    wrap.className = 'msg ai typing';
    wrap.innerHTML = `
      <div class="avatar">✦</div>
      <div class="bubble">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>`;
    listEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function hideTyping(el) { if (el) el.remove(); }

  function setLocked(locked) {
    isTyping = locked;
    sendBtn.disabled = locked || !inputEl.value.trim();
  }

  // ─────────────────────────────────────────
  //  Events
  // ─────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
    sendBtn.disabled = !inputEl.value.trim() || isTyping;
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', () => send());
  clearBtn.addEventListener('click', clearChat);

  document.getElementById('suggestions').addEventListener('click', (e) => {
    const btn = e.target.closest('.suggestion');
    if (btn) {
      const rawText = btn.textContent;
      // Strip the "try" tag text from the suggestion label
      const cleanText = rawText.replace(/^\s*try\s*/i, '').trim();
      send(cleanText);
    }
  });

  // ─────────────────────────────────────────
  //  Start
  // ─────────────────────────────────────────
  initSession();
</script>
</body>
</html>
